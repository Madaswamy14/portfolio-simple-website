<!DOCTYPE html>

    <form>
        <table>
            <thead></thead>
            <tbody>
                
                <tr>

                </tr>

                </tr>
                
                <tr>
                    <td><label>Message: </label></td>
                    <td><textarea placeholder="Message"  name="Type your Message" class="contact_form__textarea"></textarea></td>
                </tr>
                
                <tr>
                    <td></td>
                    <td><input type="submit" class="contact_form__submit"></td>
                </tr>
                
            
            </tbody>
        </table>
